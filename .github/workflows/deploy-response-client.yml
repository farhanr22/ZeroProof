name: Deploy Response Client

on:
  push:
    branches:
      - main
    paths:
      - 'response-client/**'
      - '.github/workflows/deploy-response-client.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'response-client/package-lock.json'

      - name: Install dependencies
        working-directory: ./response-client
        run: npm ci

      - name: Build project
        working-directory: ./response-client
        run: npm run build

      - name: Deploy to GitHub Pages (open-client-build branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./response-client/dist
          publish_branch: open-client-build
          commit_message: "deploy: open-client-build ${{ github.sha }}"
